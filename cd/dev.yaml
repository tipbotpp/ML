name: Pull and Deploy to Dev (ML)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  run_pull:
    name: Run Pull
    runs-on: ubuntu-latest

    steps:
      - name: Notify Start
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 **Запуск деплоя ML-сервиса на dev-окружение**
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref }}`
            Автор: `${{ github.actor }}`
            Коммит: `${{ github.event.head_commit.message }}`
            🔗 [Открыть коммит](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Install SSH keys
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}

      - name: Deploy ML service
  run: |
    ssh-keyscan -p ${{ secrets.DEV_SSH_PORT }} -H ${{ secrets.DEV_SSH_HOST }} >> ~/.ssh/known_hosts
    
    ssh -A -p ${{ secrets.DEV_SSH_PORT }} ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} << 'EOF'
      cd ${{ secrets.DEV_WORK_DIR }}
      git checkout ${{ secrets.DEV_BRANCH }}
      git pull --rebase
      
      rm -f .env
      touch .env
      echo 'API_ID=${{ secrets.ML_API_ID }}' >> .env
      echo 'API_HASH=${{ secrets.ML_API_HASH }}' >> .env
      echo 'START_DATE=${{ secrets.START_DATE }}' >> .env
      echo 'API_KEY=${{ secrets.ML_API_KEY }}' >> .env
      echo 'DEVICE=${{ secrets.DEVICE }}' >> .env
      echo 'TOXIC_THRESHOLD=${{ secrets.TOXIC_THRESHOLD }}' >> .env
      echo 'MAX_TEXT_LENGTH=${{ secrets.MAX_TEXT_LENGTH }}' >> .env
      echo 'TTS_SAMPLE_RATE=${{ secrets.TTS_SAMPLE_RATE }}' >> .env
      echo 'TTS_SPEAKER=${{ secrets.TTS_SPEAKER }}' >> .env
      echo 'LOG_LEVEL=${{ secrets.LOG_LEVEL }}' >> .env
      
      export DOCKER_BUILDKIT=1
      docker compose up -d --build
      
    EOF
      - name: Notify Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ **Деплой ML-сервиса на dev-окружение завершён успешно**
            🔗 [Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ **Ошибка при деплое ML-сервиса на dev-окружение**
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref }}`
            🔗 [Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`)
            
      - name: Cleanup
        run: rm -rf ~/.ssh